name: Full Flutter CI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Plataforma"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - android
          - windows
          - linux
          - macos
          - ios
  pull_request:
    paths-ignore:
    - "docs/**"
    - "README.md"
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  run-ci:
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: false
